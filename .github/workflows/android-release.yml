name: Build and Release Android (Alpha)

on:
  push:
    branches:
      - develop

permissions:
  contents: write

jobs:
  build-android:
    name: Build APK and Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Install dependencies
        run: npm install

      - name: Ensure fresh Android build files
        run: npx expo prebuild --platform android --clean

      - name: Build Android APK natively
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Sign APK (Required for Android Installation)
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v0.1-alpha-${{ github.run_number }}
          name: Unlink Alpha 0.1 (Build ${{ github.run_number }})
          body: |
            **Unlink v0.1 Alpha** 🚀
            
            This is an automated native build directly from the `develop` branch.
            
            ⚠️ **Note to testers:** This is an early alpha version meant for testing users right now. It will likely have bugs and incomplete features. Please report any issues directly via Telegram or GitHub issues!
            
            *No Expo EAS was used to generate this build.*
          files: ${{steps.sign_app.outputs.signedReleaseFile}}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
