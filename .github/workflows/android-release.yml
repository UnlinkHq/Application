name: Build and Release Android (Alpha)

on:
  push:
    branches:
      - develop

permissions:
  contents: write

jobs:
  build-android:
    name: Build APK and Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Install dependencies
        run: npm install

      - name: Ensure fresh Android build files
        run: npx expo prebuild --platform android --clean

      - name: Build Android APK natively
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Sign APK manually (Bulletproof)
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo $KEYSTORE_BASE64 | base64 --decode > my-release-key.keystore
          
          # Find latest build tools folder dynamically
          BUILD_TOOLS_DIR=$(ls -d $ANDROID_HOME/build-tools/* | tail -1)
          echo "Using Android Build Tools at: $BUILD_TOOLS_DIR"
          
          # Zipalign the APK
          $BUILD_TOOLS_DIR/zipalign -v -p 4 android/app/build/outputs/apk/release/app-release.apk app-release-aligned.apk
          
          # Sign the APK
          $BUILD_TOOLS_DIR/apksigner sign --ks my-release-key.keystore --ks-key-alias $KEY_ALIAS --ks-pass env:KEYSTORE_PASSWORD --key-pass env:KEY_PASSWORD --out app-release.apk app-release-aligned.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v0.1-alpha-${{ github.run_number }}
          name: Unlink Alpha 0.1 (Build ${{ github.run_number }})
          body: |
            **Unlink v0.1 Alpha** 🚀
            
            This is an automated native build directly from the `develop` branch.
            
            ⚠️ **Note to testers:** This is an early alpha version meant for testing users right now. It will likely have bugs and incomplete features. Please report any issues directly via Telegram or GitHub issues!
            
            *No Expo EAS was used to generate this build.*
          files: app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
