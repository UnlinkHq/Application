<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&amp;family=Space_Grotesk:wght@300;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "secondary-fixed-dim": "#ff8a7b",
                        "secondary-fixed": "#ffb4aa",
                        "tertiary-container": "#00a741",
                        "on-primary-fixed": "#ffffff",
                        "on-background": "#e2e2e2",
                        "primary-fixed-dim": "#454747",
                        "primary-fixed": "#5d5f5f",
                        "tertiary": "#72fe88",
                        "surface-container-lowest": "#0e0e0e",
                        "surface-variant": "#353535",
                        "error": "#ffb4ab",
                        "surface-container": "#1f1f1f",
                        "secondary": "#ffb4aa",
                        "inverse-primary": "#5d5f5f",
                        "error-container": "#93000a",
                        "surface-tint": "#c6c6c7",
                        "surface-container-highest": "#353535",
                        "on-surface-variant": "#c6c6c6",
                        "on-secondary": "#410001",
                        "surface-container-high": "#2a2a2a",
                        "surface-bright": "#393939",
                        "on-error-container": "#ffdad6",
                        "surface-dim": "#131313",
                        "surface": "#131313",
                        "on-secondary-container": "#ffdad5",
                        "secondary-container": "#930005",
                        "on-secondary-fixed": "#410001",
                        "on-primary": "#1a1c1c",
                        "background": "#131313",
                        "primary-container": "#d4d4d4",
                        "on-surface": "#e2e2e2",
                        "outline-variant": "#474747",
                        "primary": "#ffffff",
                        "outline": "#919191",
                        "on-primary-fixed-variant": "#e2e2e2",
                        "on-secondary-fixed-variant": "#7e0004",
                        "on-tertiary": "#002107",
                        "on-error": "#690005",
                        "surface-container-low": "#1b1b1b",
                        "tertiary-fixed-dim": "#00531c",
                        "on-primary-container": "#000000",
                        "inverse-surface": "#e2e2e2",
                        "inverse-on-surface": "#303030",
                        "tertiary-fixed": "#006e28",
                        "on-tertiary-fixed-variant": "#72fe88",
                        "on-tertiary-container": "#000000",
                        "on-tertiary-fixed": "#ffffff"
                    },
                    fontFamily: {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Space_Grotesk"]
                    },
                    borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 200, 'GRAD' 0, 'opsz' 24;
        }
        .fracture-line {
            background: linear-gradient(45deg, transparent 48%, #474747 49%, #474747 51%, transparent 52%);
            background-size: 10px 10px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-black text-on-background font-body selection:bg-primary selection:text-black">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-black/80 backdrop-blur-xl border-b border-white/10 flex justify-between items-center px-6 h-16">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-white" data-icon="sensors">sensors</span>
<h1 class="font-['Inter'] font-black tracking-tighter uppercase text-xl text-white">UNLINK</h1>
</div>
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-zinc-500 hover:bg-zinc-900 transition-colors active:scale-95 duration-100 p-2 rounded-sm cursor-pointer" data-icon="account_circle">account_circle</span>
</div>
</header>
<main class="min-h-screen pt-16 pb-32 px-6 flex flex-col items-center justify-center max-w-2xl mx-auto">
<!-- Minimalist Empty State Container -->
<div class="w-full flex flex-col items-center text-center space-y-12">
<!-- Abstract Icon with 'Fractured' Aesthetic -->
<div class="relative w-32 h-32 flex items-center justify-center">
<div class="absolute inset-0 border border-outline-variant/20 rounded-full animate-pulse"></div>
<div class="absolute inset-4 border border-outline-variant/40 rounded-full"></div>
<span class="material-symbols-outlined text-6xl text-on-surface-variant/30" data-icon="block" style="font-variation-settings: 'wght' 100;">block</span>
<!-- Diagonal Slash (Surgical Aesthetic) -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-24 h-[1px] bg-white/20 rotate-45"></div>
</div>
<!-- Typography Hierarchy: Information Density through Void -->
<div class="space-y-4">
<h2 class="font-headline font-black text-4xl tracking-tighter uppercase">No active block rules</h2>
<p class="font-label text-sm text-on-surface-variant uppercase tracking-[0.2em] max-w-xs mx-auto opacity-60">
                    System clear. No neural interference filters detected in current sector.
                </p>
</div>
<!-- Surgical Detail: Technical Labeling -->
<div class="flex items-center gap-4 py-8 w-full">
<div class="h-[1px] flex-grow bg-outline-variant/20"></div>
<span class="font-label text-[10px] text-outline uppercase tracking-widest px-4">Log: 00-Null-Filter</span>
<div class="h-[1px] flex-grow bg-outline-variant/20"></div>
</div>
</div>
<!-- Massive High-Contrast Action -->
<div class="fixed bottom-28 left-0 w-full px-6 flex justify-center">
<button class="w-full max-w-md bg-primary text-on-primary font-headline font-black text-lg py-5 tracking-[0.3em] uppercase transition-all active:scale-[0.98] active:opacity-90 shadow-[0_0_40px_rgba(255,255,255,0.1)] flex items-center justify-center gap-4">
<span class="material-symbols-outlined" data-icon="add">add</span>
                ADD BLOCK RULE
            </button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 w-full z-50 h-20 bg-black border-t border-white/20 flex justify-around items-center px-2 pb-safe">
<!-- Today Tab -->
<button class="flex flex-col items-center justify-center text-zinc-600 px-4 py-2 hover:text-zinc-300 transition-all active:opacity-70 duration-75">
<span class="material-symbols-outlined mb-1" data-icon="calendar_today">calendar_today</span>
<span class="font-['Space_Grotesk'] text-[10px] uppercase tracking-widest">Today</span>
</button>
<!-- Blocks Tab (ACTIVE) -->
<button class="flex flex-col items-center justify-center text-white bg-zinc-900 rounded-sm px-4 py-2 transition-all active:opacity-70 duration-75">
<span class="material-symbols-outlined mb-1" data-icon="block">block</span>
<span class="font-['Space_Grotesk'] text-[10px] uppercase tracking-widest">Blocks</span>
</button>
<!-- Socials Tab -->
<button class="flex flex-col items-center justify-center text-zinc-600 px-4 py-2 hover:text-zinc-300 transition-all active:opacity-70 duration-75">
<span class="material-symbols-outlined mb-1" data-icon="share">share</span>
<span class="font-['Space_Grotesk'] text-[10px] uppercase tracking-widest">Socials</span>
</button>
<!-- Settings Tab -->
<button class="flex flex-col items-center justify-center text-zinc-600 px-4 py-2 hover:text-zinc-300 transition-all active:opacity-70 duration-75">
<span class="material-symbols-outlined mb-1" data-icon="settings">settings</span>
<span class="font-['Space_Grotesk'] text-[10px] uppercase tracking-widest">Settings</span>
</button>
</nav>
<!-- Visual Texture: Subtle Radial Gradient for Depth -->
<div class="fixed inset-0 pointer-events-none bg-[radial-gradient(circle_at_50%_50%,rgba(20,20,20,1)_0%,rgba(0,0,0,1)_100%)] -z-10"></div>
</body></html>
