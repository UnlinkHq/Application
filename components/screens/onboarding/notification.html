<body class="text-on-surface font-body min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-black/90 backdrop-blur-xl border-b border-white/10 flex justify-between items-center px-6 h-16">
<div class="flex items-center">
<span class="material-symbols-outlined text-white cursor-pointer hover:bg-zinc-900 transition-colors p-2" data-icon="close">close</span>
</div>
<h1 class="text-xl font-bold tracking-tighter text-white font-headline">UNLINK</h1>
<div class="w-10"></div>
</header>
<main class="flex-grow flex flex-col pt-24 pb-32 px-8 max-w-2xl mx-auto w-full">
<!-- Section Header -->
<div class="mb-12">
<div class="flex items-center gap-2 mb-2">
<div class="h-[1px] w-8 bg-primary"></div>
<span class="font-label text-xs tracking-[0.2em] text-outline uppercase">Critical Permission</span>
</div>
<h2 class="text-4xl md:text-5xl font-extrabold font-headline tracking-tighter leading-none mb-6">SYSTEM AUTHORIZATION</h2>
<p class="font-body text-on-surface-variant leading-relaxed max-w-md">
                Unlink requires system-level notifications to interrupt the dopamine loop. Without this, the intervention cannot be executed.
            </p>
</div>
<!-- Notification Visual -->
<div class="flex-grow flex items-center justify-center py-12">
<div class="w-full aspect-square border border-white/10 relative flex items-center justify-center overflow-hidden">
<div class="absolute inset-0 diagonal-line opacity-30"></div>
<!-- Simplified Minimal Notification Card -->
<div class="relative z-10 w-full max-w-[280px] bg-[#111111] border border-white/10 p-5 flex gap-4 items-start shadow-2xl">
<div class="w-10 h-10 bg-white flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-black text-2xl" data-icon="notifications">notifications</span>
</div>
<div class="flex flex-col justify-center h-10">
<p class="font-headline font-bold text-sm text-white leading-tight">Notification Required</p>
<p class="font-label text-[10px] uppercase tracking-widest text-outline mt-1">System Override</p>
</div>
<!-- Corner Accents -->
<div class="absolute -top-[1px] -left-[1px] w-2 h-2 border-t border-l border-white"></div>
<div class="absolute -bottom-[1px] -right-[1px] w-2 h-2 border-b border-r border-white"></div>
</div>
<!-- Structural Grid Detail -->
<div class="absolute inset-0 border-[0.5px] border-white/5 pointer-events-none"></div>
</div>
</div>
</main>
<!-- Fixed Action Block -->
<footer class="fixed bottom-0 left-0 w-full p-6 md:p-8 bg-black/95 backdrop-blur-md border-t border-white/10 z-50">
<button class="w-full py-6 bg-primary text-on-primary font-headline font-black text-lg tracking-tighter hover:bg-zinc-200 transition-all active:scale-[0.99] duration-100 flex items-center justify-center gap-3 rounded-none">
            GIVE PERMISSION
            <span class="material-symbols-outlined text-2xl" data-icon="arrow_forward">arrow_forward</span>
</button>
<div class="mt-4 flex justify-center">
<button class="font-label text-[10px] text-outline hover:text-white transition-colors uppercase tracking-[0.3em]">
                Remind me later
            </button>
</div>
</footer>
