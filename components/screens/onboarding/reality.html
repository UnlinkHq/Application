<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&amp;family=Space_Grotesk:wght@300;400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-bright": "#393939",
              "primary-container": "#d4d4d4",
              "on-surface-variant": "#c6c6c6",
              "on-tertiary-fixed": "#ffffff",
              "on-primary-fixed-variant": "#e2e2e2",
              "on-secondary-fixed-variant": "#7e0004",
              "primary": "#ffffff",
              "on-surface": "#e2e2e2",
              "on-primary-fixed": "#ffffff",
              "surface-variant": "#353535",
              "surface-container-highest": "#353535",
              "on-tertiary-fixed-variant": "#72fe88",
              "inverse-surface": "#e2e2e2",
              "on-secondary": "#410001",
              "outline": "#919191",
              "surface-container-lowest": "#0e0e0e",
              "on-error": "#690005",
              "tertiary-container": "#00a741",
              "secondary-fixed": "#ffb4aa",
              "primary-fixed": "#5d5f5f",
              "error-container": "#93000a",
              "tertiary": "#72fe88",
              "secondary-container": "#930005",
              "surface-dim": "#131313",
              "surface-container-high": "#2a2a2a",
              "surface-container": "#1f1f1f",
              "secondary-fixed-dim": "#ff8a7b",
              "on-primary": "#1a1c1c",
              "outline-variant": "#474747",
              "tertiary-fixed": "#006e28",
              "background": "#131313",
              "on-background": "#e2e2e2",
              "surface": "#131313",
              "on-error-container": "#ffdad6",
              "surface-tint": "#c6c6c7",
              "secondary": "#ffb4aa",
              "inverse-primary": "#5d5f5f",
              "on-primary-container": "#000000",
              "surface-container-low": "#1b1b1b",
              "error": "#ffb4ab",
              "on-secondary-fixed": "#410001",
              "tertiary-fixed-dim": "#00531c",
              "on-tertiary": "#002107",
              "on-tertiary-container": "#000000",
              "primary-fixed-dim": "#454747",
              "on-secondary-container": "#ffdad5",
              "inverse-on-surface": "#303030"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Space Grotesk"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #000000;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body text-on-surface antialiased select-none">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-black border-b border-white/20 flex items-center justify-between px-6 h-16">
<div class="flex items-center">
<button class="material-symbols-outlined text-white active:scale-95 duration-100 hover:bg-white/10 p-2 rounded-full" data-icon="arrow_back">arrow_back</button>
</div>
<div class="absolute left-1/2 -translate-x-1/2">
<span class="text-xl font-black tracking-[0.2em] text-white font-headline">UNLINK</span>
</div>
<div class="w-10"></div> <!-- Spacer for symmetry -->
</header>
<main class="pt-24 pb-32 px-6 max-w-2xl mx-auto flex flex-col min-h-screen">
<!-- Header Section -->
<section class="mb-12">
<div class="flex items-baseline space-x-2 mb-1">
<span class="text-[0.7rem] font-label font-bold uppercase tracking-[0.3em] text-secondary">04</span>
<div class="h-[1px] w-8 bg-outline-variant/30 self-center"></div>
</div>
<h1 class="text-3xl font-headline font-black tracking-tighter uppercase mb-2">Your actual screen time</h1>
<p class="text-on-surface-variant font-label text-sm uppercase tracking-widest">Total for the last 7 days</p>
</section>
<!-- Main Display Data -->
<section class="mb-12 flex flex-col items-start">
<div class="flex items-baseline">
<span class="text-7xl md:text-8xl font-headline font-black tracking-tighter text-white">8h 45m</span>
</div>
<div class="mt-4 flex space-x-4">
<div class="flex items-center space-x-2 py-1 px-3 bg-surface-container-high rounded-DEFAULT">
<span class="material-symbols-outlined text-secondary text-sm" style="font-variation-settings: 'FILL' 1;">warning</span>
<span class="font-label text-[10px] uppercase tracking-wider text-on-surface font-bold">+24% from average</span>
</div>
</div>
</section>
<!-- View Toggle -->
<section class="mb-8 self-center w-full max-w-xs">
<div class="grid grid-cols-2 border border-outline-variant/50 rounded-DEFAULT p-1">
<button class="py-2 text-[10px] font-label font-bold uppercase tracking-widest text-on-surface/40 hover:text-white transition-colors">Day</button>
<button class="py-2 text-[10px] font-label font-bold uppercase tracking-widest bg-primary text-on-primary rounded-DEFAULT">Week</button>
</div>
</section>
<!-- Minimalism Instrument Chart -->
<section class="flex-grow flex flex-col justify-end">
<div class="relative h-64 w-full flex items-end justify-between border-b border-white/20 pb-2">
<!-- Chart Background Indicators -->
<div class="absolute inset-0 flex flex-col justify-between pointer-events-none">
<div class="border-t border-white/5 w-full flex justify-end">
<span class="text-[9px] font-label text-on-surface/30 pr-2 -translate-y-1">10H</span>
</div>
<div class="border-t border-white/10 w-full flex justify-end relative">
<span class="absolute right-2 -translate-y-1/2 bg-black px-1 text-[9px] font-label text-white/60 tracking-tighter">GOAL: 2H</span>
</div>
<div class="border-t border-white/5 w-full flex justify-end">
<span class="text-[9px] font-label text-on-surface/30 pr-2 -translate-y-1">0H</span>
</div>
</div>
<!-- Chart Bars -->
<div class="flex-grow h-full flex items-end justify-around px-2 z-10">
<!-- MON -->
<div class="flex flex-col items-center group w-8">
<div class="w-2 bg-on-surface-variant/40 rounded-t-sm h-[40%] transition-all group-hover:bg-primary"></div>
<span class="mt-4 text-[9px] font-label text-on-surface/40 group-hover:text-white">M</span>
</div>
<!-- TUE -->
<div class="flex flex-col items-center group w-8">
<div class="w-2 bg-on-surface-variant/40 rounded-t-sm h-[55%] transition-all group-hover:bg-primary"></div>
<span class="mt-4 text-[9px] font-label text-on-surface/40 group-hover:text-white">T</span>
</div>
<!-- WED -->
<div class="flex flex-col items-center group w-8">
<div class="w-2 bg-on-surface-variant/40 rounded-t-sm h-[35%] transition-all group-hover:bg-primary"></div>
<span class="mt-4 text-[9px] font-label text-on-surface/40 group-hover:text-white">W</span>
</div>
<!-- THU - THE DANGER BAR -->
<div class="flex flex-col items-center group w-8">
<div class="relative w-2 bg-secondary rounded-t-sm h-[92%] shadow-[0_0_15px_rgba(255,180,170,0.3)]">
<div class="absolute -top-6 left-1/2 -translate-x-1/2 text-[9px] font-label text-secondary font-bold whitespace-nowrap">9H 12M</div>
</div>
<span class="mt-4 text-[9px] font-label text-secondary font-bold">T</span>
</div>
<!-- FRI -->
<div class="flex flex-col items-center group w-8">
<div class="w-2 bg-on-surface-variant/40 rounded-t-sm h-[60%] transition-all group-hover:bg-primary"></div>
<span class="mt-4 text-[9px] font-label text-on-surface/40 group-hover:text-white">F</span>
</div>
<!-- SAT -->
<div class="flex flex-col items-center group w-8">
<div class="w-2 bg-on-surface-variant/40 rounded-t-sm h-[45%] transition-all group-hover:bg-primary"></div>
<span class="mt-4 text-[9px] font-label text-on-surface/40 group-hover:text-white">S</span>
</div>
<!-- SUN -->
<div class="flex flex-col items-center group w-8">
<div class="w-2 bg-on-surface-variant/40 rounded-t-sm h-[50%] transition-all group-hover:bg-primary"></div>
<span class="mt-4 text-[9px] font-label text-on-surface/40 group-hover:text-white">S</span>
</div>
</div>
</div>
<!-- Technical Metadata Footer -->
<div class="mt-8 grid grid-cols-2 gap-4">
<div class="p-4 bg-surface-container-low rounded-DEFAULT border-l border-white/10">
<p class="text-[9px] font-label text-on-surface/40 uppercase tracking-widest mb-1">Peak Category</p>
<p class="text-sm font-bold text-white uppercase tracking-tighter">Social Media</p>
</div>
<div class="p-4 bg-surface-container-low rounded-DEFAULT border-l border-secondary/30">
<p class="text-[9px] font-label text-on-surface/40 uppercase tracking-widest mb-1">Longest Session</p>
<p class="text-sm font-bold text-white uppercase tracking-tighter">2h 14m</p>
</div>
</div>
</section>
</main>
<!-- Fixed Action Button / Bottom Bar -->
<div class="fixed bottom-0 left-0 w-full p-6 bg-gradient-to-t from-black via-black to-transparent">
<button class="w-full h-16 bg-white text-on-primary font-headline font-black tracking-[0.2em] uppercase text-sm hover:bg-on-surface transition-all active:scale-[0.98] duration-100 flex items-center justify-center space-x-2">
<span>Continue</span>
<span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
</div>
</body></html>
